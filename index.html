<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RECAUDERIA - POS Rescate v2.3.6</title>
    <style>
        :root { --primary: #2e7d32; --bg: #f1f3f4; --accent: #f57c00; --white: #ffffff; --danger: #c62828; --info: #0288d1; --promo: #ff9800; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; min-height: 100vh; display: flex; flex-direction: column; }
        header { background: var(--primary); color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .main-layout { display: grid; grid-template-columns: 1fr 380px; gap: 15px; padding: 15px; flex: 1; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .product-card { background: var(--white); border-radius: 15px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 1px solid #ddd; display: flex; flex-direction: column; gap: 10px; }
        .product-name { font-weight: bold; color: var(--primary); font-size: 1.1em; display: flex; justify-content: space-between; }
        .price-box { background: #fff8e1; border: 1px solid #ffe082; padding: 8px; border-radius: 8px; text-align: center; }
        .price-box input { width: 60px; border: none; background: none; font-weight: bold; color: var(--accent); text-align: center; font-size: 1.1em; }
        .qty-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
        .btn-qty { background: #f0f0f0; border: 1px solid #ccc; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .gramos-box { background: #e3f2fd; padding: 8px; border-radius: 10px; display: grid; grid-template-columns: 1fr 55px; gap: 8px; }
        .gramos-input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #90caf9; outline: none; box-sizing: border-box; }
        .btn-ok { background: var(--info); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .ticket-panel { background: var(--white); border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); height: fit-content; position: sticky; top: 70px; }
        .ticket-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 0.9em; }
        .total-section { font-size: 2em; font-weight: bold; text-align: right; color: var(--primary); padding: 15px 0; }
        .btn-confirm { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }
        .nav-btn { background: rgba(255,255,255,0.2); color: white; padding: 8px 12px; border-radius: 8px; cursor: pointer; text-decoration: none; font-size: 0.8em; font-weight: bold; }
        @media (max-width: 800px) { .main-layout { grid-template-columns: 1fr; } .ticket-panel { order: -1; position: relative; top: 0; } }
    </style>
</head>
<body>

<header>
    <strong>🍎 RECAUDERIA</strong>
    <div style="display:flex; gap:5px;">
        <button class="nav-btn" onclick="limpiarCacheYRecargar()" style="background: var(--danger);">🔄 RESET</button>
        <a href="Registro.html" class="nav-btn">⚙️ CONFIG</a>
    </div>
</header>

<div class="main-layout">
    <div class="products-grid" id="gridProductos"></div>
    <div class="ticket-panel">
        <h3 style="margin:0">🛒 Ticket</h3>
        <div id="ticketList"></div>
        <div class="total-section">$<span id="totalVenta">0.00</span></div>
        <button class="btn-confirm" onclick="finalizarVenta()">COBRAR</button>
    </div>
</div>

<script>
    // CARGA ULTRA SEGURA
    let productos = [];
    try {
        const stored = localStorage.getItem('recauderia_prods');
        productos = stored ? JSON.parse(stored) : [];
        console.log("Productos cargados:", productos);
    } catch(e) { console.error("Error productos:", e); productos = []; }

    let ticket = [];

    function renderizarProductos() {
        const grid = document.getElementById('gridProductos');
        if (!grid) return;
        grid.innerHTML = "";

        if (productos.length === 0) {
            grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px; background:white; border-radius:15px;">
                <h3>No hay productos.</h3>
                <p>Ve a CONFIG para agregar tus 2 productos.</p>
            </div>`;
            return;
        }

        productos.forEach(p => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <div class="product-name">
                    ${p.nombre} 
                    <span style="font-size:0.7em; color:#888;">${parseFloat(p.kilos).toFixed(2)}kg</span>
                </div>
                <div class="price-box">$ <input type="number" value="${p.precioVenta}" onchange="actualizarPrecio('${p.id}', this.value)"> /kg</div>
                <div class="qty-row">
                    <button class="btn-qty" onclick="agregarTicket('${p.id}', 1)">1kg</button>
                    <button class="btn-qty" onclick="agregarTicket('${p.id}', 0.5)">1/2</button>
                    <button class="btn-qty" onclick="agregarTicket('${p.id}', 0.25)">1/4</button>
                </div>
                <div class="gramos-box">
                    <input type="number" id="gr_${p.id}" class="gramos-input" placeholder="Gramos">
                    <button class="btn-ok" onclick="agregarGramos('${p.id}')">OK</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function agregarTicket(id, cant) {
        const p = productos.find(prod => prod.id == id);
        if(p) {
            ticket.push({ nombre: p.nombre, cantidad: cant, subtotal: p.precioVenta * cant, id: p.id });
            actualizarUI();
        }
    }

    function agregarGramos(id) {
        const val = document.getElementById(`gr_${id}`).value;
        if(val > 0) { agregarTicket(id, val/1000); document.getElementById(`gr_${id}`).value = ''; }
    }

    function actualizarUI() {
        const list = document.getElementById('ticketList');
        let total = 0;
        list.innerHTML = ticket.map((item, i) => {
            total += item.subtotal;
            return `<div class="ticket-item">
                <span>${item.nombre}</span>
                <span>$${item.subtotal.toFixed(2)} <button onclick="ticket.splice(${i},1); actualizarUI()">&times;</button></span>
            </div>`;
        }).join('');
        document.getElementById('totalVenta').innerText = total.toFixed(2);
    }

    function finalizarVenta() {
        if(ticket.length === 0) return;
        ticket.forEach(item => {
            const idx = productos.findIndex(p => p.id == item.id);
            if(idx !== -1) productos[idx].kilos -= item.cantidad;
        });
        localStorage.setItem('recauderia_prods', JSON.stringify(productos));
        ticket = []; actualizarUI(); renderizarProductos();
        alert("Venta registrada.");
    }

    function actualizarPrecio(id, v) {
        const idx = productos.findIndex(p => p.id == id);
        if(idx !== -1) {
            productos[idx].precioVenta = parseFloat(v);
            localStorage.setItem('recauderia_prods', JSON.stringify(productos));
        }
    }

    function limpiarCacheYRecargar() {
        if(confirm("Esto limpiará errores de promociones pero mantendrá tus productos. ¿Continuar?")) {
            localStorage.removeItem('recauderia_promos');
            location.reload();
        }
    }

    window.onload = renderizarProductos;
</script>
</body>
</html>
